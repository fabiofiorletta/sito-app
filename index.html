<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabina Moda - Scarica l'App</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/85z1X84w/app-store-badge-clean.png">

    <style>
        /* --- RESET E STILI BASE --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column; /* Cambiato per allineare gli elementi verticalmente */
            align-items: center; /* Centra orizzontalmente */
            justify-content: flex-start; /* Posiziona i contenuti dall'alto */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000; /* Sfondo Nero */
            color: #ffffff;
            overflow: hidden;
            padding-top: 50px; /* Spazio dal bordo superiore */
        }

        #app-landing-page {
            text-align: center;
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- IL TUO LOGO IN ALTO --- */
        .main-showcase {
            max-width: 280px; 
            height: auto;
            margin-bottom: 50px;
            animation: fadeInSlight 1s ease-out;
        }

        /* --- CONTENITORE PULSANTI IN BASSO --- */
        .download-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            margin-top: auto; /* Sposta i pulsanti verso il basso */
            padding-bottom: 50px; /* Spazio dal bordo inferiore */
        }

        .download-btn {
            display: inline-block;
            transition: transform 0.2s ease, opacity 0.2s ease;
            text-decoration: none;
        }

        .download-btn:hover {
            transform: scale(1.06);
        }

        .download-btn img {
            height: 60px; /* Altezza uniforme */
            width: auto;
            display: block;
            border-radius: 9px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.05);
        }

        @keyframes fadeInSlight {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 600px) {
            body, html {
                padding-top: 30px; /* Ridotto per mobile */
            }
            .main-showcase {
                max-width: 220px;
                margin-bottom: 30px;
            }
            .download-btn img {
                height: 55px;
            }
            .download-buttons {
                flex-direction: column; /* I bottoni si incolonnano sui telefoni piccoli */
                gap: 15px;
                padding-bottom: 30px; /* Ridotto per mobile */
            }
        }
    </style>
</head>
<body>

<div id="app-landing-page">
    
    <img src="logo.png" alt="Sabina Moda Logo" class="main-showcase">

    <div class="download-buttons">
        
        <a href="IL_TUO_LINK_APP_STORE" class="download-btn" target="_blank" rel="noopener">
            <img src="logoapple.png" alt="App Store">
        </a>

        <a href="IL_TUO_LINK_GOOGLE_PLAY" class="download-btn" target="_blank" rel="noopener">
            <img src="https://i.postimg.cc/H8yMh8f8/google-play-badge-clean.png" alt="Google Play">
        </a>

    </div>

</div>

</body>
</html>
