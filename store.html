<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SABINA | Dettagli Store & Collezioni</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #000000;
            --bg-light: #FFFFFF;
            --text-main: #FFFFFF;
            --text-dark: #000000;
            --text-muted: #A3A3A3;
            --accent-red: #FF0000;
            --border-white: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .text-center { text-align: center; }

        /* HEADER */
        header {
            background-color: #000000;
            border-bottom: 1px solid var(--border-white);
            width: 100%;
        }

        .nav-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 90px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin: 0 auto;
        }

        .logo-img {
            max-height: 42px;
            width: auto;
            display: block;
        }

        .btn-back {
            position: absolute;
            left: 24px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .btn-back:hover {
            color: var(--accent-red);
        }

        /* STRUTTURA SLIDESHOW (16:9) */
        .slider-section {
            padding: 40px 0;
        }

        .slider-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #0A0A0A;
            border: 1px solid var(--border-white);
            overflow: hidden;
        }

        .slider-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .slide {
            min-width: 100%;
            height: 100%;
            position: relative;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Frecce Navigazione */
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: var(--text-main);
            border: 1px solid var(--border-white);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 200;
            z-index: 10;
            transition: all 0.2s ease;
            user-select: none;
        }

        .slider-arrow:hover {
            background-color: var(--accent-red);
            border-color: var(--accent-red);
        }

        .arrow-left { left: 0; border-left: none; }
        .arrow-right { right: 0; border-right: none; }

        /* Indicatori Trattini */
        .slider-indicators {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .indicator-line {
            width: 35px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .indicator-line.active {
            background-color: var(--accent-red);
        }

        /* DETTAGLI CONTENT */
        .store-details-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 48px;
            padding: 40px 0 80px 0;
        }

        @media (min-width: 768px) {
            .store-details-grid { grid-template-columns: 1.5fr 1fr; }
        }

        .store-title {
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .store-type {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-red);
            font-weight: 600;
            margin-bottom: 24px;
            display: block;
        }

        .store-desc {
            font-size: 1rem;
            font-weight: 200;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* INFO PANEL */
        .info-panel {
            border: 1px solid var(--border-white);
            padding: 40px 32px;
            background-color: #050505;
        }

        .info-block-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 12px;
            font-weight: 200;
        }

        .phone-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 32px;
            transition: color 0.2s ease;
        }

        .phone-link:hover { color: var(--accent-red); }

        .btn-accent {
            display: block;
            background-color: var(--accent-red);
            color: var(--text-main);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 18px;
            border: none;
            border-radius: 0;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            font-size: 0.85rem;
            transition: opacity 0.2s ease;
        }

        .btn-accent:hover { opacity: 0.9; }

        footer {
            padding: 48px 0;
            border-top: 1px solid var(--border-white);
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="btn-back">← Home</a>
            <a href="index.html" class="logo-container">
                <img src="assets/img/logo-sabina-white.svg" alt="SABINA" class="logo-img" id="mainLogo" onerror="showFallbackLogo()">
            </a>
        </div>
    </header>

    <main class="container">
        
        <section class="slider-section">
            <div class="slider-container">
                <div class="slider-arrow arrow-left" onclick="moveSlide(-1)">❮</div>
                <div class="slider-arrow arrow-right" onclick="moveSlide(1)">❯</div>
                
                <div class="slider-wrapper" id="sliderWrapper">
                    <div class="slide"><img id="img-slide-1" src="" alt="SABINA Gallery 1"></div>
                    <div class="slide"><img id="img-slide-2" src="" alt="SABINA Gallery 2"></div>
                    <div class="slide"><img id="img-slide-3" src="" alt="SABINA Gallery 3"></div>
                </div>

                <div class="slider-indicators">
                    <div class="indicator-line active" onclick="setSlide(0)"></div>
                    <div class="indicator-line" onclick="setSlide(1)"></div>
                    <div class="indicator-line" onclick="setSlide(2)"></div>
                </div>
            </div>
        </section>

        <section class="store-details-grid">
            <div>
                <h1 id="store-name" class="store-title">---</h1>
                <span id="store-tag" class="store-type">---</span>
                <p id="store-description" class="store-desc">---</p>
            </div>

            <div>
                <div class="info-panel">
                    <h3 class="info-block-title">Contatto Diretto</h3>
                    <a id="store-phone" href="tel:" class="phone-link">---</a>

                    <h3 class="info-block-title">Orari di Apertura</h3>
                    <div>
                        <div class="info-row"><span>Lunedì - Sabato</span> <span>09:00 - 13:00 / 16:00 - 20:00</span></div>
                        <div class="info-row"><span>Domenica</span> <span style="color: var(--accent-red)">Chiuso</span></div>
                    </div>

                    <div style="margin-top: 40px;">
                        <a id="store-maps-link" href="" target="_blank" class="btn-accent">🧭 Avvia Navigatore Maps</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="text-center">
        <p>© 2026 SABINA. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        // Database sicuro con estensione .jpg per gli slideshow interni
        const storeDatabase = {
            frosinone: {
                name: "Frosinone",
                tag: "Main Store",
                desc: "Il cuore pulsante del brand SABINA. Situato nella strategica Viale Europa, il Main Store offre la selezione completa e più profonda delle ultime novità Fast Fashion settimanali, affiancata da un corner esclusivo dedicato agli abiti da Cerimonia. Ampio parcheggio esterno e consulenza d'immagine personalizzata con il nostro staff storico.",
                phone: "+39 0775 123456",
                maps: "https://maps.google.com/?q=Sabina+Moda+Frosinone",
                images: [
                    "assets/img/store-frosinone-1.jpg",
                    "assets/img/store-frosinone-2.jpg",
                    "assets/img/store-frosinone-3.jpg"
                ]
            },
            alatri: {
                name: "Alatri",
                tag: "Boutique",
                desc: "Situata in Via Provinciale 51, la boutique di Alatri unisce la freschezza delle trends della Gen Z ad un'atmosfera d'acquisto intima e curata. Perfetta per scoprire gli outfit quotidiani della settimana selezionati con cura per garantire sempre esclusività e stile minimale ad altissimo impatto.",
                phone: "+39 0775 654321",
                maps: "https://maps.google.com/?q=Sabina+Moda+Alatri",
                images: [
                    "assets/img/store-alatri-1.jpg",
                    "assets/img/store-alatri-2.jpg",
                    "assets/img/store-alatri-3.jpg"
                ]
            },
            veroli: {
                name: "Veroli",
                tag: "Concept Store",
                desc: "Il Concept Store di Veroli in Via Sant'Angelo in Villa 22 è uno spazio geometrico e contemporaneo ideato per valorizzare l'identità Noir del brand. Una galleria di stile in cui perdersi tra i trend del momento e i consigli sartoriali Made in Italy ereditati da 25 anni di passione della fondatrice Sabina Perciballi.",
                phone: "+39 0775 987654",
                maps: "https://maps.google.com/?q=Sabina+Moda+Veroli",
                images: [
                    "assets/img/store-veroli-1.jpg",
                    "assets/img/store-veroli-2.jpg",
                    "assets/img/store-veroli-3.jpg"
                ]
            }
        };

        // Lettura sicura del parametro ?shop= dall'indirizzo URL
        const urlParams = new URLSearchParams(window.location.search);
        let shopKey = urlParams.get('shop');
        
        // Se il parametro è vuoto o sbagliato, forza il caricamento sicuro su frosinone
        if (!shopKey || !storeDatabase[shopKey]) { 
            shopKey = 'frosinone'; 
        }

        const currentStore = storeDatabase[shopKey];

        // Iniesta istantaneamente i testi scacciando i trattini ---
        document.getElementById('store-name').innerText = currentStore.name;
        document.getElementById('store-tag').innerText = currentStore.tag;
        document.getElementById('store-description').innerText = currentStore.desc;
        
        const phoneElem = document.getElementById('store-phone');
        phoneElem.innerText = currentStore.phone;
        phoneElem.href = "tel:" + currentStore.phone.replace(/\s+/g, '');
        document.getElementById('store-maps-link').href = currentStore.maps;

        // Inserimento immagini dello slideshow (.jpg)
        document.getElementById('img-slide-1').src = currentStore.images[0];
        document.getElementById('img-slide-2').src = currentStore.images[1];
        document.getElementById('img-slide-3').src = currentStore.images[2];

        // GESTIONE SLIDER
        let currentSlideIndex = 0;
        const wrapper = document.getElementById('sliderWrapper');
        const indicators = document.querySelectorAll('.indicator-line');

        function updateSliderPosition() {
            wrapper.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
            indicators.forEach((ind, idx) => {
                if (idx === currentSlideIndex) {
                    ind.classList.add('active');
                } else {
                    ind.classList.remove('active');
                }
            });
        }

        function moveSlide(direction) {
            currentSlideIndex += direction;
            if (currentSlideIndex > 2) { currentSlideIndex = 0; }
            if (currentSlideIndex < 0) { currentSlideIndex = 2; }
            updateSliderPosition();
        }

        function setSlide(index) {
            currentSlideIndex = index;
            updateSliderPosition();
        }

        // Touch swipe per smartphone
        let touchStartX = 0;
        let touchEndX = 0;
        const sliderContainer = document.querySelector('.slider-container');

        sliderContainer.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        sliderContainer.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            const threshold = 50;
            if (touchStartX - touchEndX > threshold) moveSlide(1);
            if (touchEndX - touchStartX > threshold) moveSlide(-1);
        }, {passive: true});

        function showFallbackLogo() {
            const container = document.querySelector('.logo-container');
            container.innerHTML = '<span style="font-weight:200; letter-spacing:6px; font-size:1.5rem; color:#FFFFFF;">SABINA</span>';
        }
    </script>
</body>
</html>
