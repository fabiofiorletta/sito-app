<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SABINA | Dettagli Store</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #000000;
            --bg-light: #FFFFFF;
            --text-main: #FFFFFF;
            --text-dark: #000000;
            --text-muted: #A3A3A3;
            --accent-red: #FF0000;
            --border-white: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .flex { display: flex; }
        .text-center { text-align: center; }

        /* HEADER (Perfettamente allineato alla Home) */
        header {
            background-color: #000000;
            border-bottom: 1px solid var(--border-white);
            width: 100%;
        }

        .nav-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 90px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin: 0 auto;
        }

        .logo-img {
            max-height: 42px;
            width: auto;
            display: block;
        }

        /* TORNA ALLA HOME */
        .btn-back {
            position: absolute;
            left: 24px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .btn-back:hover {
            color: var(--accent-red);
        }

        /* STORE HERO GALLERY */
        .gallery-section {
            padding: 40px 0;
        }

        .main-image-container {
            width: 100%;
            aspect-ratio: 16 / 9; /* Layout orizzontale richiesto */
            background-color: #1A1A1A;
            overflow: hidden;
            border: 1px solid var(--border-white);
            margin-bottom: 24px;
        }

        .main-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* DETTAGLI STORE CONTENT */
        .store-details-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 48px;
            padding: 40px 0 80px 0;
        }

        @media (min-width: 768px) {
            .store-details-grid {
                grid-template-columns: 1.5fr 1fr;
            }
        }

        .store-title {
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .store-type {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-red);
            font-weight: 600;
            margin-bottom: 24px;
            display: block;
        }

        .store-desc {
            font-size: 1rem;
            font-weight: 200;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* INFO CARD (ORARI & TELEFONO) */
        .info-panel {
            border: 1px solid var(--border-white);
            padding: 40px 32px;
            background-color: #050505;
        }

        .info-block-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 12px;
            font-weight: 200;
        }

        .phone-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 32px;
            transition: color 0.2s ease;
        }

        .phone-link:hover {
            color: var(--accent-red);
        }

        /* ACCENTO ROSSO CHIRURGICO PER MAPS */
        .btn-accent {
            display: block;
            background-color: var(--accent-red);
            color: var(--text-main);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 18px;
            border: none;
            border-radius: 0;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            font-size: 0.85rem;
            transition: opacity 0.2s ease;
        }

        .btn-accent:hover {
            opacity: 0.9;
        }

        /* FOOTER */
        footer {
            padding: 48px 0;
            border-top: 1px solid var(--border-white);
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="btn-back">← Home</a>
            <a href="index.html" class="logo-container">
                <img src="assets/img/logo-sabina-white.svg" alt="SABINA" class="logo-img" id="mainLogo" onerror="showFallbackLogo()">
            </a>
        </div>
    </header>

    <main class="container">
        
        <section class="gallery-section">
            <div class="main-image-container">
                <img id="store-main-img" src="" alt="SABINA Store" class="main-image">
            </div>
        </section>

        <section class="store-details-grid">
            
            <div>
                <h1 id="store-name" class="store-title">---</h1>
                <span id="store-tag" class="store-type">---</span>
                <p id="store-description" class="store-desc">---</p>
            </div>

            <div>
                <div class="info-panel">
                    <h3 class="info-block-title">Contatto Diretto</h3>
                    <a id="store-phone" href="tel:" class="phone-link">---</a>

                    <h3 class="info-block-title">Orari di Apertura</h3>
                    <div id="store-hours-list">
                        <div class="info-row"><span>Lunedì - Sabato</span> <span>09:00 - 13:00 / 16:00 - 20:00</span></div>
                        <div class="info-row"><span>Domenica</span> <span style="color: var(--accent-red)">Chiuso</span></div>
                    </div>

                    <div style="margin-top: 40px;">
                        <a id="store-maps-link" href="" target="_blank" class="btn-accent">🧭 Avvia Navigatore Maps</a>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <footer class="text-center">
        <p>© 2026 SABINA. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        // Database interno dei 3 Store di Frosinone, Alatri e Veroli
        const storeDatabase = {
            frosinone: {
                name: "Frosinone",
                tag: "Main Store",
                desc: "Il cuore pulsante del brand SABINA. Situato nella strategica Viale Europa, il Main Store offre la selezione completa e più profonda delle ultime novità Fast Fashion settimanali, affiancata da un corner esclusivo dedicato agli abiti da Cerimonia. Ampio parcheggio esterno e consulenza d'immagine personalizzata con il nostro staff storico.",
                phone: "+39 0775 123456", // Inserisci il numero reale di Frosinone
                img: "assets/img/store-frosinone.jpg",
                maps: "https://maps.google.com/?q=SABINA+Viale+Europa+Frosinone" // Sostituisci con link effettivo scheda Google
            },
            alatri: {
                name: "Alatri",
                tag: "Boutique",
                desc: "Situata in Via Provinciale 51, la boutique di Alatri unisce la freschezza delle tendenze della Gen Z ad un'atmosfera d'acquisto intima e curata. Perfetta per scoprire gli outfit quotidiani della settimana selezionati con cura per garantire sempre esclusività e stile minimale ad altissimo impatto.",
                phone: "+39 0775 654321", // Inserisci il numero reale di Alatri
                img: "assets/img/store-alatri.jpg",
                maps: "https://maps.google.com/?q=Via+Provinciale+51+Alatri" // Sostituisci con link effettivo scheda Google
            },
            veroli: {
                name: "Veroli",
                tag: "Concept Store",
                desc: "Il Concept Store di Veroli in Via Sant'Angelo in Villa 22 è uno spazio geometrico e contemporaneo ideato per valorizzare l'identità Noir del brand. Una galleria di stile in cui perdersi tra i trend del momento e i consigli sartoriali Made in Italy ereditati da 25 anni di passione della fondatrice Sabina Perciballi.",
                phone: "+39 0775 987654", // Inserisci il numero reale di Veroli
                img: "assets/img/store-veroli.jpg",
                maps: "https://maps.google.com/?q=Via+Sant'Angelo+in+Villa+22+Veroli" // Sostituisci con link effettivo scheda Google
            }
        };

        // Rilevatore intelligente dell'indirizzo URL (?shop=nome)
        const urlParams = new URLSearchParams(window.location.search);
        let shopKey = urlParams.get('shop') || 'frosinone'; // Default se manca il parametro

        // Se l'utente scrive un nome strano nell'URL, fa il fallback su Frosinone
        if (!storeDatabase[shopKey]) { shopKey = 'frosinone'; }

        const currentStore = storeDatabase[shopKey];

        // Iniesta i dati dinamicamente nei tag corretti all'istante
        document.getElementById('store-name').innerText = currentStore.name;
        document.getElementById('store-tag').innerText = currentStore.tag;
        document.getElementById('store-description').innerText = currentStore.desc;
        
        const phoneElem = document.getElementById('store-phone');
        phoneElem.innerText = currentStore.phone;
        phoneElem.href = "tel:" + currentStore.phone.replace(/\s+/g, '');

        document.getElementById('store-maps-link').href = currentStore.maps;

        // Gestione Foto Orizzontale con Fallback automatico
        const imgElem = document.getElementById('store-main-img');
        imgElem.src = currentStore.img;
        imgElem.onerror = function() {
            // Se non hai ancora caricato la foto reale su GitHub, inserisce una foto stock elegante grigia di moda
            this.src = "https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200&auto=format&fit=crop";
            this.style.filter = "grayscale(100%)";
        };

        // Fallback per il logo dell'header
        function showFallbackLogo() {
            const container = document.querySelector('.logo-container');
            container.innerHTML = '<span style="font-weight:200; letter-spacing:6px; font-size:1.5rem; color:#FFFFFF;">SABINA</span>';
        }
    </script>
</body>
</html>
